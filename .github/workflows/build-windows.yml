name: Build Ladybird for Windows (.exe)

on: [push, pull_request]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies via Chocolatey
        # The instructions specify installing pkgconfiglite via choco.
        # GitHub's windows-latest runner comes with Chocolatey pre-installed.
        run: |
          choco install pkgconfiglite -y
          
      - name: Set up Visual Studio Command Prompt
        # This action sets up the environment variables to use the VS MSVC / Clang-CL compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Ladybird
        run: |
          py Meta\ladybird.py build

      - name: Install Ladybird
        run: |
          cmake --install Build\release --prefix ladybird-install

      - name: Copy third-party Dependency DLLs
        # This copies all the vcpkg DLLs (Qt6, pthreads, etc.) and Qt plugins (like qwindows.dll)
        # GitHub Actions windows-latest uses PowerShell by default for 'run' commands
        run: |
          Copy-Item "Build\release\vcpkg_installed\x64-windows\bin\*.dll" -Destination "ladybird-install\bin" -Force
          
          # Qt applications also require the "platforms" folder to open a window
          Copy-Item "Build\release\vcpkg_installed\x64-windows\Qt6\plugins\*" -Destination "ladybird-install\bin" -Recurse -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ladybird-Windows-Build
          path: ladybird-install\
